<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 15px; background: #0d1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    /* Updated header to push gear icon to the right */
    h2 { margin-top: 0; font-size: 16px; color: #60a5fa; display: flex; align-items: center; justify-content: space-between; }
    input, textarea { width: 100%; box-sizing: border-box; background: #161b22; border: 1px solid #30363d; color: white; padding: 10px; margin-bottom: 12px; border-radius: 6px; font-family: inherit; }
    textarea { height: 120px; resize: none; font-size: 13px; line-height: 1.5;}
    input:focus, textarea:focus { outline: none; border-color: #58a6ff; }
    button { width: 100%; background: #238636; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: background 0.2s;}
    button:hover { background: #2ea043; }
    button.secondary { background: #21262d; border: 1px solid #30363d; }
    button.secondary:hover { background: #30363d; }
    /* Style for the invisible gear button */
    .icon-btn { background: transparent; border: none; padding: 4px; width: auto; font-size: 16px; cursor: pointer; border-radius: 4px; }
    .icon-btn:hover { background: #30363d; }
    #status { margin-top: 10px; font-size: 12px; text-align: center; font-weight: 500; }
    hr { border: 0; border-top: 1px solid #30363d; margin: 15px 0; }
    .hidden { display: none !important; }
    .settings-group { background: #010409; padding: 12px; border-radius: 6px; border: 1px solid #30363d; }
    .settings-group label { font-size: 11px; color: #8b949e; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h2>
    <span>Powder Clipper</span>
    <button id="settings-toggle" class="icon-btn" title="Toggle Settings">⚙️</button>
  </h2>

  <!-- UNLOCK SCREEN -->
  <div id="unlock-screen" class="hidden">
    <p style="font-size: 13px; color: #8b949e; margin-top: 0;">Vault is locked. Enter your PIN to decrypt your API key for this session.</p>
    <input type="password" id="unlock-pin" placeholder="Enter Vault PIN">
    <button id="unlock-btn">Unlock Vault</button>
  </div>

  <!-- CLIPPER SCREEN -->
  <div id="clipper-screen" class="hidden">
    <input type="text" id="clip-title" placeholder="Note Title...">
    <textarea id="clip-content" placeholder="Highlight text or type here..."></textarea>
    <input type="text" id="clip-source" readonly style="color: #8b949e; font-size: 11px; background: transparent; border: none; padding: 0; margin-bottom: 15px;">

    <button id="save-btn">Save to Vault</button>

    <!-- WRAPPED CONFIGURATION -->
    <div id="config-panel" class="hidden">
      <hr>
      <div class="settings-group">
        <label>Server URL</label>
        <input type="text" id="server-url" placeholder="http://localhost:8000">
        <label>API Key (Will be encrypted)</label>
        <input type="password" id="api-key" placeholder="Paste new key to update">
        <label>Vault PIN (For encryption)</label>
        <input type="password" id="setup-pin" placeholder="Create a short PIN">
        <button id="save-settings-btn" class="secondary" style="padding: 6px;">Encrypt & Save</button>
      </div>
    </div>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
