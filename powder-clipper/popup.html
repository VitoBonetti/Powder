<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; background: #0d1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    h2 { margin-top: 0; font-size: 16px; color: #60a5fa; display: flex; align-items: center; gap: 8px;}
    input, textarea { width: 100%; box-sizing: border-box; background: #161b22; border: 1px solid #30363d; color: white; padding: 10px; margin-bottom: 12px; border-radius: 6px; font-family: inherit; }
    textarea { height: 120px; resize: none; font-size: 13px; line-height: 1.5;}
    input:focus, textarea:focus { outline: none; border-color: #58a6ff; }
    button { width: 100%; background: #238636; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: background 0.2s;}
    button:hover { background: #2ea043; }
    button:disabled { background: #234b2c; color: #8b949e; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 12px; text-align: center; font-weight: 500; }
  </style>
</head>
<body>
  <h2>⚡ Powder Clipper</h2>
  <input type="text" id="clip-title" placeholder="Note Title...">
  <textarea id="clip-content" placeholder="Highlight some text on the page first, or type here..."></textarea>
  <input type="text" id="clip-source" readonly style="color: #8b949e; font-size: 11px; background: transparent; border: none; padding: 0; margin-bottom: 15px;">

  <button id="save-btn">Save to Vault</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
